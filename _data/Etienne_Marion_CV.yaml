cv:
  name: Etienne Marion
  headline:
  location: Office 725 C1, 45 rue des Saints-Pères, 75006 Paris
  email: etienne.marion@ens-lyon.fr
  photo:
  phone:
  website: https://etiennec30.github.io
  # social_networks:
  #   - network: LinkedIn
  #     username: rendercv
  #   - network: GitHub
  #     username: rendercv
  custom_connections:
  sections:
    Summary:
      - "I am studying Mathematics at École Normale Supérieure de Lyon. I completed my M.Sc. in probability and statistics and am now doing research internships before starting my PhD next year. I am mainly interested in probability theory applied to population genetics and formalization of Mathematics using the proof assistant Lean."
    # Welcome to RenderCV:
    #   - RenderCV reads a CV written in a YAML file, and generates a PDF with professional typography.
    #   - Each section title is arbitrary.
    #   - You can choose any of the 9 entry types for each section.
    #   - Markdown syntax is supported everywhere. This is **bold**, *italic*, and [link](https://example.com).
    education:
      - institution: École Normale Supérieure de Lyon
        area: probability and statistics
        degree: MS
        date:
        start_date: 2023
        end_date: 2025
        location: Lyon, France
        summary:
        # highlights:
        #   - "Thesis: Efficient Neural Architecture Search for Resource-Constrained Deployment"
        #   - "Advisor: Prof. Sanjeev Arora"
        #   - NSF Graduate Research Fellowship, Siebel Scholar (Class of 2022)
      - institution: École Normale Supérieure de Lyon
        area: mathematics
        degree: BS
        date:
        start_date: 2022
        end_date: 2023
        location: Lyon, France
        summary:
        # highlights:
        #   - "GPA: 3.97/4.00, Valedictorian"
        #   - Fulbright Scholarship recipient for Graduate Studies
      - institution: Lycée Georges Clemenceau
        area: mathematics and physics
        degree: Classe préparatoire
        start_date: 2020
        end_date: 2022
        location: Reims, France
    Research experience:
      - company: MAP5, Université Paris-Cité
        position: Research intern
        date:
        start_date: 2026-02-14
        end_date: 2026-07-03
        location: Paris, France
        summary: "Supervised by Félix Foutel-Rodier: *Impact of demographic fluctuations on structured populations genealogies.*"
        # highlights:
        #   - Built foundation model infrastructure serving 2M+ monthly API requests with 99.97% uptime
        #   - Raised $18M Series A led by Sequoia Capital, with participation from a16z and Founders Fund
        #   - Scaled engineering team from 3 to 28 across ML research, platform, and applied AI divisions
        #   - Developed proprietary inference optimization reducing latency by 73% compared to baseline
      - company: University of Vienna
        position: Research intern
        date:
        start_date: 2025-09-15
        end_date: 2026-01-12
        location: Vienna, Austria
        summary: "Supervised by Emmanuel Schertzer: *Diffusive neutral fractions inside a genetic population.*"
      - company: École Normale Supérieure de Lyon
        position: Research intern
        date:
        start_date: 2025-03-31
        end_date: 2025-07-25
        location: Lyon, France
        summary: "Supervised by Jean-Christophe Mourrat: *Study of functions learnable by neural networks using mean-fields approximation.*"
      - company: Institut de recherche mathématique de Rennes
        position: Research intern
        date:
        start_date: 2024-05-13
        end_date: 2024-07-05
        location: Rennes, France
        summary: "Supervised by Sébastien Gouëzel: *Formalization of the Ionescu-Tulca theorem and construction of infinite products of porobability measures with Lean.*"
      - company: Laboratoire Jean Kuntzmann
        position: Research intern
        date:
        start_date: 2023-05-15
        end_date: 2023-06-23
        location: Grenoble, France
        summary: "Supervised by Sana Louhichi: *Tight sequences of random variables: definition, examples and application.*"
    preprints:
      - title: Formalization of Brownian motion in Lean
        authors:
          - Rémy Degenne
          - David Ledvinka
          - Etienne Marion
          - Peter Pfaffelhuber
        summary:
        url: https://arxiv.org/abs/2511.20118
        journal:
        date: 2025+
      - title: A Formalization of the Ionescu-Tulcea Theorem in Mathlib
        authors:
          - Etienne Marion
        summary:
        url: https://arxiv.org/abs/2506.18616
        journal:
        date: 2025+
    talk:
      - title: A Formalization of the Ionescu-Tulcea Theorem in Mathlib
        date: 2026-01
        authors:
          - "[Lean Together 2026](https://leanprover-community.github.io/lt2026/)"
        url: https://www.youtube.com/watch?v=_TrTKnWU-to
    Participation to conferences:
      - "**Apr 2026:** I was present at the [3rd annual meeting of the GdR Branchement](https://arbre3.sciencesconf.org/?lang=en) in Avignon."
      - "**Sept 2025:** I was present at the workshop [Ancestral lines in population models with interaction](https://boku.ac.at/nwnr/math/newsitem/84254) at BOKU University, in Vienne."
      - "**June 2025:** I was present at the summer school [Local Limits of Random Graphs](https://fondation-hadamard.fr/fr/evenements/les-ecoles-dete/ecole-d-ete-avec-slmath/) at Institut de Mathématique d’Orsay."
      - "**Mar 2024:** I was present at the conference [Lean for the curious mathematician](https://conferences.cirm-math.fr/2970.html) at CIRM."
    Other activities:
      - I am part of the Mathlib [reviewer team](https://leanprover-community.github.io/teams/reviewers.html). I am assessing the mathematical relevance and the quality of the code that contributors wish to add to the library, especially in the probability section.
      - "**Sept - Dec 2023:** With three fellow students we gave an introductory course to category theory, shaped as a weekly seminar."

